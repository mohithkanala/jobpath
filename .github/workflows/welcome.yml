name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            Welcome to jobpath, @${{ github.actor }}, and thanks for your first PR.

            - CI will run automatically once a maintainer approves it.
            - Link the related issue (if any) in the description.
            - Make sure no personal data (CVs, applications, real names) is included in the diff.
          issue_message: |
            Thanks for opening your first issue, @${{ github.actor }}.

            - Check the README and QUICKSTART.md for setup help first.
            - For bugs, include reproduction steps and your environment (OS, Node version, agent).
